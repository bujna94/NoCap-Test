<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GPT-2 Training Speedup - Experiment Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0d1117; --surface: #161b22; --border: #30363d;
    --text: #e6edf3; --muted: #8b949e; --accent: #58a6ff;
    --green: #3fb950; --red: #f85149; --yellow: #d29922; --purple: #bc8cff; --orange: #ff9f1c;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', monospace; background: var(--bg); color: var(--text); padding: 20px; }
  h1 { font-size: 1.5em; margin-bottom: 4px; }
  .header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 24px; border-bottom: 1px solid var(--border); padding-bottom: 16px; }
  .header-left h1 span { color: var(--accent); }
  .header-right { text-align: right; color: var(--muted); font-size: 0.85em; }
  .target-badge { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 4px 10px; font-size: 0.85em; display: inline-block; margin-top: 6px; }
  .target-badge strong { color: var(--yellow); }

  .stats { display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; min-width: 120px; }
  .stat-card .label { color: var(--muted); font-size: 0.7em; text-transform: uppercase; letter-spacing: 0.5px; }
  .stat-card .value { font-size: 1.3em; font-weight: bold; margin-top: 2px; }
  .stat-card .value.green { color: var(--green); }
  .stat-card .value.red { color: var(--red); }
  .stat-card .value.yellow { color: var(--yellow); }
  .stat-card .value.accent { color: var(--accent); }
  .stat-card .sub { color: var(--muted); font-size: 0.7em; margin-top: 1px; }

  .system-bar { display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; }
  .sys-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; min-width: 150px; flex: 1; }
  .sys-card .label { color: var(--muted); font-size: 0.7em; text-transform: uppercase; letter-spacing: 0.5px; }
  .sys-card .bar-bg { height: 6px; background: var(--border); border-radius: 3px; margin-top: 6px; overflow: hidden; }
  .sys-card .bar-fill { height: 100%; border-radius: 3px; transition: width 0.5s; }
  .sys-card .bar-fill.green { background: var(--green); }
  .sys-card .bar-fill.yellow { background: var(--yellow); }
  .sys-card .bar-fill.red { background: var(--red); }
  .sys-card .stats-line { display: flex; justify-content: space-between; margin-top: 4px; font-size: 0.8em; }
  .sys-card .stats-line .val { font-weight: bold; }

  .chart-container { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 16px; margin-bottom: 24px; position: relative; height: 400px; }
  .chart-container h2 { font-size: 1em; margin-bottom: 12px; color: var(--muted); }
  .chart-wrapper { position: relative; height: 360px; width: 100%; }

  .experiments { display: grid; gap: 16px; min-width: 0; }
  .exp-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 16px; min-width: 0; overflow: hidden; }
  .exp-card:hover { border-color: var(--accent); }
  .exp-card .top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; margin-bottom: 8px; }
  .exp-card .name { font-weight: bold; font-size: 1.05em; overflow-wrap: break-word; word-break: break-word; min-width: 0; flex: 1; }
  .badge { padding: 2px 8px; border-radius: 12px; font-size: 0.75em; font-weight: bold; text-transform: uppercase; }
  .badge.running { background: rgba(210,153,34,0.2); color: var(--yellow); animation: pulse 2s infinite; }
  .badge.stale { background: rgba(139,148,158,0.2); color: var(--muted); }
  .badge.completed { background: rgba(63,185,80,0.2); color: var(--green); }
  .badge.ultra { background: rgba(255,159,28,0.22); color: var(--orange); }
  .badge.partial { background: rgba(188,140,255,0.2); color: var(--purple); }
  .badge.failed { background: rgba(248,81,73,0.2); color: var(--red); }
  .badge.pending { background: rgba(139,148,158,0.2); color: var(--muted); }
  .exp-card.success-ultra { border-color: var(--orange); box-shadow: 0 0 0 1px rgba(255,159,28,0.35) inset; }
  .exp-card.success-full { border-color: var(--green); }
  .exp-card.success-partial { border-color: var(--purple); }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }

  .exp-card .hypothesis { color: var(--muted); font-size: 0.85em; margin-bottom: 10px; font-style: italic; overflow-wrap: break-word; word-break: break-word; }
  .exp-card .metrics { display: flex; gap: 20px; flex-wrap: wrap; font-size: 0.85em; }
  .exp-card .metric { display: flex; flex-direction: column; }
  .exp-card .metric .mlabel { color: var(--muted); font-size: 0.75em; }
  .exp-card .metric .mvalue { font-weight: bold; }
  .exp-card .findings { margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); color: var(--muted); font-size: 0.8em; }
  .exp-card .progress-bar { height: 4px; background: var(--border); border-radius: 2px; margin-top: 10px; overflow: hidden; }
  .exp-card .progress-bar .fill { height: 100%; background: var(--accent); transition: width 0.3s; }
  .exp-card .progress-text { color: var(--muted); font-size: 0.75em; margin-top: 4px; text-align: right; }
  .exp-card .details-toggle { color: var(--accent); font-size: 0.8em; cursor: pointer; margin-top: 8px; user-select: none; }
  .exp-card .details-toggle:hover { text-decoration: underline; }
  .exp-card .details { display: none; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); font-size: 0.8em; }
  .exp-card .details.open { display: block; }
  .exp-card .details .detail-section { margin-bottom: 10px; }
  .exp-card .details .detail-label { color: var(--accent); font-weight: bold; font-size: 0.85em; margin-bottom: 4px; }
  .exp-card .details .detail-content { color: var(--muted); white-space: pre-wrap; line-height: 1.5; overflow-wrap: break-word; word-break: break-word; }
  .val-table-wrap { overflow-x: auto; }
  .exp-card .details .val-table { width: 100%; font-size: 0.9em; border-collapse: collapse; }
  .exp-card .details .val-table td, .exp-card .details .val-table th { padding: 3px 8px; text-align: left; border-bottom: 1px solid var(--border); }
  .exp-card .details .val-table th { color: var(--muted); font-weight: normal; }

  .no-data { text-align: center; color: var(--muted); padding: 60px 20px; font-size: 1.1em; }
  .refresh-indicator { font-size: 0.75em; color: var(--muted); }
  .speedup-positive { color: var(--green); }
  .speedup-negative { color: var(--red); }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <h1><span>GPT-2</span> Training Speedup Experiments</h1>
    <div class="target-badge">Ultra: val loss <strong>&le; 3.3821</strong> &amp; time <strong>3.88h</strong> &nbsp;|&nbsp; Success: faster than baseline</div>
  </div>
  <div class="header-right">
    <div class="refresh-indicator" id="refresh-status">Auto-refresh: 10s</div>
    <div id="last-update"></div>
  </div>
</div>

<div class="system-bar" id="system-bar"></div>

<div class="stats" id="stats"></div>

<div class="chart-container">
  <h2>Validation Loss Curves</h2>
  <div class="chart-wrapper"><canvas id="lossChart"></canvas></div>
</div>

<h2 style="font-size:1em; color:var(--muted); margin-bottom:12px;">Experiments</h2>
<div class="experiments" id="experiments"></div>
<div class="no-data" id="no-data" style="display:none;">No experiments yet. Start the experiment harness to begin.</div>

<script>
const COLORS = ['#58a6ff','#3fb950','#f85149','#d29922','#bc8cff','#f778ba','#79c0ff','#56d364','#ff7b72','#e3b341'];
let chart = null;
let data = null;
let sysData = null;
let firstLoad = true;
const openDetails = new Set();  // track which experiment details are open
const ULTRA_TARGET_HOURS = 3.88;
const ULTRA_TARGET_SECONDS = ULTRA_TARGET_HOURS * 3600;

async function fetchData() {
  try {
    const [expResp, sysResp] = await Promise.all([
      fetch('/experiments.json?t=' + Date.now()),
      fetch('/api/system?t=' + Date.now())
    ]);
    if (expResp.ok) data = await expResp.json();
    if (sysResp.ok) sysData = await sysResp.json();
    render();
  } catch(e) { console.error('Fetch error:', e); }
}

function formatTime(seconds) {
  if (seconds == null) return '-';
  const h = Math.floor(seconds / 3600);
  const m = Math.floor((seconds % 3600) / 60);
  const s = Math.floor(seconds % 60);
  if (h > 0) return `${h}h ${m}m ${s}s`;
  if (m > 0) return `${m}m ${s}s`;
  return `${s}s`;
}

function barColor(pct) {
  if (pct > 85) return 'red';
  if (pct > 60) return 'yellow';
  return 'green';
}

function renderSystem() {
  const el = document.getElementById('system-bar');
  if (!sysData) { el.innerHTML = ''; return; }
  const gpuPct = sysData.gpu_util || 0;
  const gpuMemPct = sysData.gpu_mem_total ? Math.round(sysData.gpu_mem_used / sysData.gpu_mem_total * 100) : 0;
  const ramPct = sysData.ram_total_gb ? Math.round(sysData.ram_used_gb / sysData.ram_total_gb * 100) : 0;
  const temp = sysData.gpu_temp;

  el.innerHTML = `
    <div class="sys-card">
      <div class="label">GPU Usage</div>
      <div class="bar-bg"><div class="bar-fill ${barColor(gpuPct)}" style="width:${gpuPct}%"></div></div>
      <div class="stats-line"><span class="val">${gpuPct}%</span></div>
    </div>
    <div class="sys-card">
      <div class="label">GPU Memory</div>
      <div class="bar-bg"><div class="bar-fill ${barColor(gpuMemPct)}" style="width:${gpuMemPct}%"></div></div>
      <div class="stats-line"><span class="val">${sysData.gpu_mem_used || '-'} / ${sysData.gpu_mem_total || '-'} MiB</span><span>${gpuMemPct}%</span></div>
    </div>
    <div class="sys-card">
      <div class="label">RAM</div>
      <div class="bar-bg"><div class="bar-fill ${barColor(ramPct)}" style="width:${ramPct}%"></div></div>
      <div class="stats-line"><span class="val">${sysData.ram_used_gb || '-'} / ${sysData.ram_total_gb || '-'} GB</span><span>${ramPct}%</span></div>
    </div>
    <div class="sys-card">
      <div class="label">GPU Temp</div>
      <div class="bar-bg"><div class="bar-fill ${barColor(temp > 90 ? 90 : temp)}" style="width:${temp ? Math.min(temp, 100) : 0}%"></div></div>
      <div class="stats-line"><span class="val">${temp != null ? temp + ' °C' : '-'}</span></div>
    </div>
  `;
}

function getOutcome(exp, baselineTime) {
  if (exp.status !== 'completed' || exp.name === 'exp0_baseline') return 'none';
  const valOk = exp.final_val_loss != null && exp.final_val_loss <= data.target_val_loss;
  const timeOk = exp.total_time_seconds != null && baselineTime != null && exp.total_time_seconds < baselineTime;
  const ultraTimeOk = exp.total_time_seconds != null && exp.total_time_seconds < ULTRA_TARGET_SECONDS;
  if (exp.ultra_success === true || (valOk && ultraTimeOk)) return 'ultra';
  if (valOk && timeOk) return 'full';
  if (valOk) return 'partial';
  return 'none';
}

function getRunningState(exps) {
  const running = exps.filter(e => e.status === 'running');
  if (running.length === 0) return { activeNames: new Set(), staleNames: new Set() };
  // Single-GPU harness runs one experiment at a time. Keep the newest as active.
  const sorted = [...running].sort((a, b) => {
    const ta = a.start_time ? Date.parse(a.start_time) : 0;
    const tb = b.start_time ? Date.parse(b.start_time) : 0;
    return tb - ta;
  });
  const activeNames = new Set([sorted[0].name]);
  const staleNames = new Set(sorted.slice(1).map(e => e.name));
  return { activeNames, staleNames };
}

function renderStats() {
  const el = document.getElementById('stats');
  const exps = data.experiments || [];
  const baselineTime = data.baseline_time_seconds;
  const runningState = getRunningState(exps);
  const total = exps.length;
  const completed = exps.filter(e => e.status === 'completed').length;
  const failed = exps.filter(e => e.status === 'failed').length;
  const running = runningState.activeNames.size;
  const staleRunning = runningState.staleNames.size;
  const fullSuccesses = exps.filter(e => getOutcome(e, baselineTime) === 'full').length;
  const ultraSuccesses = exps.filter(e => getOutcome(e, baselineTime) === 'ultra').length;
  const partialSuccesses = exps.filter(e => getOutcome(e, baselineTime) === 'partial').length;

  const completedExps = exps.filter(e => e.status === 'completed' && e.final_val_loss != null);
  const bestLoss = completedExps.length > 0 ? Math.min(...completedExps.map(e => e.final_val_loss)) : null;

  const fastestUltra = exps.filter(e => getOutcome(e, baselineTime) === 'ultra' && e.total_time_seconds)
    .sort((a,b) => a.total_time_seconds - b.total_time_seconds)[0];

  const fastestFull = exps.filter(e => (getOutcome(e, baselineTime) === 'full' || getOutcome(e, baselineTime) === 'ultra') && e.total_time_seconds)
    .sort((a,b) => a.total_time_seconds - b.total_time_seconds)[0];

  el.innerHTML = `
    <div class="stat-card"><div class="label">Total Attempts</div><div class="value accent">${total}</div></div>
    <div class="stat-card"><div class="label">Running</div><div class="value yellow">${running}</div></div>
    <div class="stat-card"><div class="label">Stale Running</div><div class="value">${staleRunning}</div><div class="sub">ghost rows</div></div>
    <div class="stat-card"><div class="label">Completed</div><div class="value">${completed}</div></div>
    <div class="stat-card"><div class="label">Ultra Success</div><div class="value" style="color:var(--orange)">${ultraSuccesses}</div><div class="sub">val + under 3.88h</div></div>
    <div class="stat-card"><div class="label">Full Success</div><div class="value green">${fullSuccesses}</div><div class="sub">val + speed</div></div>
    <div class="stat-card"><div class="label">Partial Success</div><div class="value" style="color:var(--purple)">${partialSuccesses}</div><div class="sub">val loss only</div></div>
    <div class="stat-card"><div class="label">Failures</div><div class="value red">${failed}</div></div>
    <div class="stat-card"><div class="label">Best Val Loss</div><div class="value ${bestLoss && bestLoss <= data.target_val_loss ? 'green' : ''}">${bestLoss != null ? bestLoss.toFixed(4) : '-'}</div></div>
    <div class="stat-card"><div class="label">Baseline Time</div><div class="value">${formatTime(baselineTime)}</div></div>
    <div class="stat-card"><div class="label">Ultra Target</div><div class="value">${formatTime(ULTRA_TARGET_SECONDS)}</div></div>
    <div class="stat-card"><div class="label">Best Ultra Time</div><div class="value ${fastestUltra ? 'accent' : ''}">${fastestUltra ? formatTime(fastestUltra.total_time_seconds) : '-'}</div></div>
    <div class="stat-card"><div class="label">Best Speedup</div><div class="value ${fastestFull && baselineTime ? 'green' : ''}">${fastestFull && baselineTime ? ((1 - fastestFull.total_time_seconds / baselineTime) * 100).toFixed(1) + '%' : '-'}</div></div>
  `;
}

function buildDatasets() {
  const exps = data.experiments.filter(e => e.val_loss_history && e.val_loss_history.length > 0);
  const datasets = exps.map((exp, i) => ({
    label: exp.display_name || exp.name,
    data: exp.val_loss_history.map(p => ({x: p.step, y: p.val_loss})),
    borderColor: COLORS[i % COLORS.length],
    backgroundColor: 'transparent',
    borderWidth: 2,
    pointRadius: 1,
    tension: 0.3,
  }));
  if (exps.length > 0) {
    const maxStep = Math.max(...exps.flatMap(e => e.val_loss_history.map(p => p.step)));
    datasets.push({
      label: 'Target (3.3821)',
      data: [{x: 0, y: data.target_val_loss}, {x: maxStep, y: data.target_val_loss}],
      borderColor: '#f85149',
      borderDash: [6, 4],
      borderWidth: 1.5,
      pointRadius: 0,
    });
  }
  return datasets;
}

function renderChart() {
  const canvas = document.getElementById('lossChart');
  const datasets = buildDatasets();

  if (chart) {
    // Update data in-place without animation on refresh
    chart.data.datasets = datasets;
    chart.update('none');
  } else {
    // First load: create chart with animation
    chart = new Chart(canvas, {
      type: 'scatter',
      data: { datasets },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        resizeDelay: 0,
        animation: { duration: 800 },
        scales: {
          x: { title: { display: true, text: 'Step', color: '#8b949e' }, grid: { color: '#21262d' }, ticks: { color: '#8b949e' } },
          y: { title: { display: true, text: 'Val Loss', color: '#8b949e' }, grid: { color: '#21262d' }, ticks: { color: '#8b949e' }, min: 3.0 }
        },
        plugins: {
          legend: { labels: { color: '#e6edf3', usePointStyle: true, pointStyle: 'line' } },
        },
        showLine: true,
      }
    });
  }
}

function renderExperiments() {
  const el = document.getElementById('experiments');
  const noData = document.getElementById('no-data');
  const exps = data.experiments || [];

  if (exps.length === 0) {
    el.innerHTML = '';
    noData.style.display = 'block';
    return;
  }
  noData.style.display = 'none';

  const reversed = [...exps].reverse();
  const runningState = getRunningState(exps);
  el.innerHTML = reversed.map((exp) => {
    const i = exps.indexOf(exp);
    const baselineTime = data.baseline_time_seconds;
    const outcome = getOutcome(exp, baselineTime);
    const valOk = exp.final_val_loss != null && exp.final_val_loss <= data.target_val_loss;
    const timeOk = exp.total_time_seconds != null && baselineTime != null && exp.total_time_seconds < baselineTime;
    const ultraTimeOk = exp.total_time_seconds != null && exp.total_time_seconds < ULTRA_TARGET_SECONDS;

    let speedupHtml = '';
    if (exp.total_time_seconds && baselineTime && exp.name !== 'exp0_baseline') {
      const pct = ((1 - exp.total_time_seconds / baselineTime) * 100);
      speedupHtml = `<div class="metric"><span class="mlabel">Speedup</span><span class="mvalue ${pct > 0 ? 'speedup-positive' : 'speedup-negative'}">${pct > 0 ? '+' : ''}${pct.toFixed(1)}%</span></div>`;
    }

    // Step progress
    const totalSteps = exp.total_steps || 4768;
    let lastStep = exp.last_step || 0;
    if (!lastStep && exp.train_loss_history && exp.train_loss_history.length > 0) {
      lastStep = exp.train_loss_history[exp.train_loss_history.length - 1].step;
    }
    const stepPct = Math.min(100, (lastStep / totalSteps) * 100);

    let progressHtml = '';
    let progressText = '';
    if (exp.status === 'running') {
      progressHtml = `<div class="progress-bar"><div class="fill" style="width:${stepPct}%"></div></div>`;
      const eta = exp.total_time_seconds && lastStep > 0 ? (exp.total_time_seconds / lastStep) * (totalSteps - lastStep) : null;
      progressText = `<div class="progress-text">${lastStep}/${totalSteps} steps (${stepPct.toFixed(1)}%)${eta ? ' &middot; ETA: ' + formatTime(eta) : ''}</div>`;
    }

    // GPU mem display
    const gpuMemStr = exp.peak_memory_mib ? exp.peak_memory_mib + ' MiB' :
      (sysData && sysData.gpu_mem_used && exp.status === 'running' ? sysData.gpu_mem_used + ' MiB (live)' : '-');

    // Build val loss table for details
    let valTableHtml = '';
    if (exp.val_loss_history && exp.val_loss_history.length > 0) {
      const rows = exp.val_loss_history.map(p =>
        `<tr><td>${p.step}</td><td>${p.val_loss.toFixed(4)}</td><td>${p.val_loss <= data.target_val_loss ? '<span style="color:var(--green)">&#10003;</span>' : ''}</td></tr>`
      ).join('');
      valTableHtml = `<div class="val-table-wrap"><table class="val-table"><tr><th>Step</th><th>Val Loss</th><th></th></tr>${rows}</table></div>`;
    }

    // Avg step time
    let avgStepTime = '-';
    if (exp.total_time_seconds && lastStep > 0) {
      avgStepTime = (exp.total_time_seconds / lastStep * 1000).toFixed(0) + ' ms';
    }

    // Badge: running/failed use status; completed use outcome
    let badgeClass, badgeText;
    if (exp.status === 'running' && runningState.activeNames.has(exp.name)) { badgeClass = 'running'; badgeText = 'running'; }
    else if (exp.status === 'running' && runningState.staleNames.has(exp.name)) { badgeClass = 'stale'; badgeText = 'stale'; }
    else if (exp.status === 'failed') { badgeClass = 'failed'; badgeText = 'failed'; }
    else if (outcome === 'ultra') { badgeClass = 'ultra'; badgeText = 'ultra success'; }
    else if (outcome === 'full') { badgeClass = 'completed'; badgeText = 'success'; }
    else if (outcome === 'partial') {
      badgeClass = 'partial';
      badgeText = 'partial (val)';
    } else { badgeClass = 'pending'; badgeText = exp.status; }

    const cardClass = outcome === 'ultra' ? 'success-ultra' : outcome === 'full' ? 'success-full' : outcome === 'partial' ? 'success-partial' : '';

    return `
      <div class="exp-card ${cardClass}">
        <div class="top">
          <span class="name">#${i} ${exp.display_name || exp.name}</span>
          <span class="badge ${badgeClass}">${badgeText}</span>
        </div>
        ${exp.description ? `<div class="hypothesis">${exp.description}</div>` : ''}
        <div class="metrics">
          <div class="metric"><span class="mlabel">Steps</span><span class="mvalue">${lastStep}/${totalSteps}</span></div>
          <div class="metric"><span class="mlabel">Val Loss</span><span class="mvalue" style="color:${valOk ? 'var(--green)' : 'var(--text)'}">${exp.final_val_loss != null ? exp.final_val_loss.toFixed(4) : '-'}${valOk ? ' ✓' : ''}</span></div>
          <div class="metric"><span class="mlabel">Time</span><span class="mvalue" style="color:${ultraTimeOk ? 'var(--orange)' : (timeOk ? 'var(--green)' : 'var(--text)')}">${formatTime(exp.total_time_seconds)}${ultraTimeOk ? ' ★' : (timeOk ? ' ✓' : '')}</span></div>
          <div class="metric"><span class="mlabel">GPU Mem</span><span class="mvalue">${gpuMemStr}</span></div>
          <div class="metric"><span class="mlabel">Avg Step</span><span class="mvalue">${avgStepTime}</span></div>
          ${speedupHtml}
        </div>
        ${progressHtml}
        ${progressText}
        ${exp.key_findings ? `<div class="findings">${exp.key_findings}</div>` : ''}
        <div class="details-toggle" onclick="toggleDetails('${exp.name}', this);">${openDetails.has(exp.name) ? '▾ Hide details' : '▸ Show details'}</div>
        <div class="details${openDetails.has(exp.name) ? ' open' : ''}">
          <div class="detail-section">
            <div class="detail-label">Hypothesis</div>
            <div class="detail-content">${exp.claude_metadata?.hypothesis || exp.description || 'N/A'}</div>
          </div>
          ${exp.claude_metadata?.expected_impact ? `<div class="detail-section"><div class="detail-label">Expected Impact</div><div class="detail-content">${exp.claude_metadata.expected_impact}</div></div>` : ''}
          ${exp.claude_metadata?.risk_assessment ? `<div class="detail-section"><div class="detail-label">Risk Assessment</div><div class="detail-content">${exp.claude_metadata.risk_assessment}</div></div>` : ''}
          ${exp.key_findings ? `<div class="detail-section"><div class="detail-label">Analysis / Findings</div><div class="detail-content">${exp.key_findings}</div></div>` : ''}
          <div class="detail-section">
            <div class="detail-label">Timing</div>
            <div class="detail-content">Total: ${formatTime(exp.total_time_seconds)} | Avg step: ${avgStepTime} | Steps: ${lastStep}/${totalSteps}${exp.start_time ? ' | Started: ' + new Date(exp.start_time).toLocaleString() : ''}${exp.end_time ? ' | Ended: ' + new Date(exp.end_time).toLocaleString() : ''}</div>
          </div>
          ${exp.claude_metadata?.run_args ? `<div class="detail-section"><div class="detail-label">Run Command</div><div class="detail-content" style="font-family:monospace;font-size:0.85em;background:var(--bg);padding:8px;border-radius:4px;overflow-wrap:break-word;word-break:break-all;">torchrun --standalone --nproc_per_node=1 train_gpt2.py ${exp.claude_metadata.run_args}</div></div>` : ''}
          <div class="detail-section">
            <div class="detail-label">Script Location</div>
            <div class="detail-content" style="font-family:monospace;">experiments/${exp.name}/train_gpt2.py</div>
          </div>
          <div class="detail-section">
            <div class="detail-label">Validation Loss History</div>
            ${valTableHtml || '<div class="detail-content">No data yet</div>'}
          </div>
        </div>
      </div>
    `;
  }).join('');
}

function toggleDetails(name, el) {
  if (openDetails.has(name)) {
    openDetails.delete(name);
    el.textContent = '▸ Show details';
    el.nextElementSibling.classList.remove('open');
  } else {
    openDetails.add(name);
    el.textContent = '▾ Hide details';
    el.nextElementSibling.classList.add('open');
  }
}

function render() {
  if (!data) return;
  renderSystem();
  renderStats();
  renderChart();
  renderExperiments();
  document.getElementById('last-update').textContent = 'Updated: ' + new Date().toLocaleTimeString();
}

fetchData();
setInterval(fetchData, 10000);
</script>
</body>
</html>
